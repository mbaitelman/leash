<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){var t=localStorage.getItem('leash-theme')||
      (window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
      document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leash</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sb:    #0f172a;
      --sb-bd: rgba(255,255,255,.06);
      --bg:    #f5f7fa;
      --sur:   #ffffff;
      --bd:    #e2e8f0;
      --bd2:   #f1f5f9;
      --tx:    #0f172a;
      --mu:    #64748b;
      --mu2:   #94a3b8;
      --ac:    #7c3aed;
      --ach:   #6d28d9;
      --ac-lo: rgba(124,58,237,.1);
      --ac-bg: #f5f3ff;
      --ok:    #059669;
      --ok-bg: #ecfdf5;
      --ok-bd: #a7f3d0;
      --er:    #dc2626;
      --er-bg: #fef2f2;
      --er-bd: #fecaca;
      --wn:    #d97706;
      --wn-bg: #fffbeb;
      --car:   #f8fafc;
      --car-h: #f1f5f9;
      --hov:   rgba(0,0,0,.02);
      --shad:  0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shad2: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
      --log-bg:   #f8fafc;
      --log-tx:   #1e293b;
      --log-mu:   #64748b;
      --log-time: #94a3b8;
      --log-dbg:  #94a3b8;
      --log-info: #2563eb;
      --log-warn: #b45309;
      --log-err:  #dc2626;
      --font: system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
      --mono: ui-monospace,'Cascadia Code','Fira Code',Consolas,monospace;
      --r: 8px; --r-sm: 6px;
    }
    html,body { height:100%; }
    body { font-family:var(--font); background:var(--bg); color:var(--tx); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
    a { color:inherit; text-decoration:none; }
    button { font-family:inherit; }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .app { display:flex; height:100vh; }
    .sidebar { width:220px; flex-shrink:0; background:var(--sb); display:flex; flex-direction:column; border-right:1px solid rgba(255,255,255,.04); }
    .main { flex:1; overflow-y:auto; background:var(--bg); }
    .page { padding:32px 36px; max-width:1000px; }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    .brand { padding:18px 14px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--sb-bd); }
    .brand-logo { width:30px; height:30px; border-radius:7px; flex-shrink:0; }
    .brand-text { font-size:16px; font-weight:700; color:#fff; letter-spacing:-.3px; }

    .nav-section { padding:10px 8px; flex:1; display:flex; flex-direction:column; gap:2px; }
    .nav-link { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:var(--r-sm); color:rgba(255,255,255,.48); font-size:13.5px; cursor:pointer; transition:background .1s,color .1s; user-select:none; position:relative; }
    .nav-link:hover { background:rgba(255,255,255,.06); color:rgba(255,255,255,.82); }
    .nav-link.active { background:rgba(124,58,237,.18); color:#fff; }
    .nav-link.active::before { content:''; position:absolute; left:0; top:5px; bottom:5px; width:3px; border-radius:0 2px 2px 0; background:var(--ac); }
    .nav-link svg { opacity:.7; flex-shrink:0; }
    .nav-link.active svg { opacity:1; }
    .nav-badge { margin-left:auto; background:rgba(220,38,38,.85); color:#fff; font-size:10px; font-weight:700; padding:1px 5px; border-radius:10px; line-height:1.5; }
    .nav-divider { height:1px; background:var(--sb-bd); margin:6px 8px; }

    .sidebar-footer { padding:8px 8px 12px; border-top:1px solid var(--sb-bd); display:flex; flex-direction:column; gap:2px; }
    .sidebar-schedule { padding:5px 10px; font-size:11.5px; color:rgba(255,255,255,.32); display:flex; align-items:center; gap:6px; }
    .sidebar-schedule svg { flex-shrink:0; }
    .theme-btn { display:flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:var(--r-sm); border:none; background:transparent; color:rgba(255,255,255,.38); cursor:pointer; transition:background .1s,color .1s; }
    .theme-btn:hover { background:rgba(255,255,255,.07); color:rgba(255,255,255,.75); }

    /* ── Page header ─────────────────────────────────────────────────────── */
    .page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .page-title { font-size:20px; font-weight:700; letter-spacing:-.4px; }
    .page-sub { font-size:13px; color:var(--mu); margin-top:3px; }
    .btn-row { display:flex; align-items:center; gap:8px; }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:var(--r-sm); font-size:13px; font-weight:500; cursor:pointer; border:none; transition:background .12s,box-shadow .12s,opacity .12s; line-height:1; white-space:nowrap; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .btn-primary { background:var(--ac); color:#fff; box-shadow:0 1px 2px rgba(0,0,0,.15); }
    .btn-primary:hover:not(:disabled) { background:var(--ach); box-shadow:0 2px 8px rgba(124,58,237,.4); }
    .btn-ghost { background:var(--sur); color:var(--tx); border:1px solid var(--bd); box-shadow:var(--shad); }
    .btn-ghost:hover:not(:disabled) { background:var(--car); border-color:var(--mu2); }
    .btn-sm  { padding:5px 10px; font-size:12px; }
    .btn-xs  { padding:3px 8px; font-size:11px; }
    .dry-check { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--mu); cursor:pointer; }
    .dry-check input { accent-color:var(--ac); cursor:pointer; }

    /* ── Back link ───────────────────────────────────────────────────────── */
    .back-link { display:inline-flex; align-items:center; gap:5px; color:var(--mu); font-size:13px; margin-bottom:16px; cursor:pointer; transition:color .1s; }
    .back-link:hover { color:var(--tx); }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card { background:var(--sur); border:1px solid var(--bd); border-radius:var(--r); box-shadow:var(--shad); overflow:hidden; }

    /* ── Stat grid (overview) ────────────────────────────────────────────── */
    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
    .stat-card { background:var(--sur); border:1px solid var(--bd); border-radius:var(--r); box-shadow:var(--shad); padding:18px 20px; }
    .stat-icon { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
    .si-ac  { background:var(--ac-bg); color:var(--ac); }
    .si-ok  { background:var(--ok-bg); color:var(--ok); }
    .si-er  { background:var(--er-bg); color:var(--er); }
    .si-neu { background:var(--car); color:var(--mu); }
    .stat-label { font-size:11.5px; font-weight:600; color:var(--mu); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
    .stat-value { font-size:26px; font-weight:700; letter-spacing:-.5px; line-height:1; }
    .stat-sub   { font-size:12px; color:var(--mu); margin-top:6px; }

    /* ── Table ───────────────────────────────────────────────────────────── */
    .table { width:100%; border-collapse:collapse; font-size:13.5px; }
    .table th { text-align:left; padding:10px 16px; font-size:11px; font-weight:600; color:var(--mu); text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid var(--bd); white-space:nowrap; background:var(--car); }
    .table td { padding:12px 16px; border-bottom:1px solid var(--bd); vertical-align:middle; }
    .table tbody tr:last-child td { border-bottom:none; }
    .table tbody tr.clickable { cursor:pointer; }
    .table tbody tr.clickable:hover td { background:var(--hov); }

    /* ── Badges ──────────────────────────────────────────────────────────── */
    .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; }
    .badge-live { background:#dcfce7; color:#15803d; border:1px solid #bbf7d0; }
    .badge-dry  { background:#ede9fe; color:#5b21b6; border:1px solid #ddd6fe; }
    .badge-ok   { background:#dcfce7; color:#15803d; border:1px solid #bbf7d0; }
    .badge-err  { background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; }
    .badge-neu  { background:#f3f4f6; color:#374151; border:1px solid #e5e7eb; }

    /* ── Run meta strip ──────────────────────────────────────────────────── */
    .run-meta { display:flex; background:var(--sur); border:1px solid var(--bd); border-radius:var(--r); box-shadow:var(--shad); overflow:hidden; margin-bottom:24px; }
    .meta-item { flex:1; padding:16px 20px; border-right:1px solid var(--bd); }
    .meta-item:last-child { border-right:none; }
    .meta-label { font-size:11px; font-weight:600; color:var(--mu); text-transform:uppercase; letter-spacing:.06em; margin-bottom:5px; }
    .meta-value { font-size:16px; font-weight:700; }

    /* ── Section headers ─────────────────────────────────────────────────── */
    .section-hdr { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
    .sh-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .sh-dot-er { background:var(--er); }
    .sh-dot-ok { background:var(--ok); }
    .sh-title  { font-size:13px; font-weight:700; }
    .sh-count  { margin-left:auto; font-size:11px; font-weight:600; color:var(--mu); background:var(--car); border:1px solid var(--bd); padding:1px 7px; border-radius:10px; }
    .mt16 { margin-top:16px; }
    .mt24 { margin-top:24px; }

    /* ── Match cards ─────────────────────────────────────────────────────── */
    .match-card { margin:0 12px 10px; background:var(--sur); border:1px solid var(--bd); border-radius:var(--r-sm); overflow:hidden; }
    .match-card.violation { border-left:3px solid var(--er); }
    .match-card.passing   { border-left:3px solid var(--ok); }
    .match-header { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--car); border-bottom:1px solid var(--bd); }
    .match-name { font-weight:600; font-size:13.5px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .match-id { font-family:var(--mono); font-size:11px; color:var(--mu); }
    .dd-link { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:500; color:var(--ac); white-space:nowrap; flex-shrink:0; padding:4px 8px; border-radius:var(--r-sm); transition:background .1s; }
    .dd-link:hover { background:var(--ac-bg); }
    .match-body { padding:10px 14px; }
    .props-table { font-size:12px; border-collapse:collapse; width:100%; margin-bottom:6px; }
    .props-table td { padding:2px 8px 2px 0; vertical-align:top; }
    .props-table td:first-child { font-family:var(--mono); color:var(--mu); width:140px; white-space:nowrap; }
    .props-table td:last-child  { font-family:var(--mono); word-break:break-all; }
    .action-badges { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; padding-top:8px; border-top:1px solid var(--bd2); }

    /* Tag chips */
    .tag-list { display:flex; flex-wrap:wrap; gap:4px; }
    .tag-chip { display:inline-flex; align-items:center; padding:2px 7px; border-radius:4px; font-family:var(--mono); font-size:11px; background:var(--ac-bg); color:var(--ac); border:1px solid rgba(124,58,237,.15); white-space:nowrap; }

    /* Match bubble */
    .match-bubble { display:inline-flex; align-items:center; justify-content:center; min-width:22px; height:22px; padding:0 5px; border-radius:11px; font-size:11px; font-weight:700; flex-shrink:0; }
    .bubble-0   { background:var(--car); color:var(--mu); border:1px solid var(--bd); }
    .bubble-pos { background:var(--er-bg); color:var(--er); border:1px solid var(--er-bd); }

    /* Policy rows (collapsible) */
    .pol-row { border-bottom:1px solid var(--bd); }
    .pol-row:last-child { border-bottom:none; }
    .pol-row-hdr { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; transition:background .1s; user-select:none; }
    .pol-row-hdr:hover { background:var(--hov); }
    .pol-chevron { transition:transform .15s; color:var(--mu2); flex-shrink:0; }
    .pol-chevron.open { transform:rotate(90deg); }
    .pol-row-name { font-weight:600; font-size:13.5px; flex:1; }
    .pol-row-type { font-size:12px; color:var(--mu); }
    .pol-row-body { border-top:1px solid var(--bd2); padding:4px 0 8px; display:none; }
    .pol-row-body.open { display:block; }
    .pass-toggle-wrap { padding:6px 16px 4px; }

    /* ── Policy editor ───────────────────────────────────────────────────── */
    .editor-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
    .editor-filename { font-size:17px; font-weight:700; }
    .save-status { font-size:12px; color:var(--mu); transition:color .2s; }
    .save-status.dirty { color:var(--wn); }
    .save-status.saved { color:var(--ok); }
    .cm-wrap { border:1px solid var(--bd); border-radius:var(--r); overflow:hidden; transition:border-color .12s,box-shadow .12s; box-shadow:var(--shad); }
    .cm-wrap.focused { border-color:var(--ac); box-shadow:0 0 0 3px rgba(124,58,237,.12); }
    .cm-wrap .CodeMirror { height:calc(100vh - 196px); font-family:var(--mono); font-size:13px; line-height:1.65; background:var(--sur); color:var(--tx); }
    .cm-wrap .CodeMirror-scroll { border-radius:var(--r); }
    [data-theme="dark"] .cm-wrap .CodeMirror { background:#1e1e2e; color:#cdd6f4; }
    .kbd { font-family:var(--mono); font-size:10px; color:var(--mu); background:var(--car); border:1px solid var(--bd); border-radius:3px; padding:1px 4px; }

    /* ── Log controls ────────────────────────────────────────────────────── */
    .level-sel { padding:5px 8px; border:1px solid var(--bd); border-radius:var(--r-sm); font-size:12.5px; color:var(--tx); background:var(--sur); cursor:pointer; outline:none; font-family:var(--font); box-shadow:var(--shad); }
    .level-sel:focus { border-color:var(--ac); }
    .level-sel-label { font-size:12px; color:var(--mu); white-space:nowrap; }
    .log-toolbar { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .lvl-btn { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid transparent; transition:opacity .12s; }
    .lvl-btn.off { opacity:.3; }
    .lvl-DEBUG { background:#f3f4f6; color:#6b7280; border-color:#e5e7eb; }
    .lvl-INFO  { background:#dbeafe; color:#1d4ed8; border-color:#bfdbfe; }
    .lvl-WARN  { background:#fef3c7; color:#92400e; border-color:#fde68a; }
    .lvl-ERROR { background:#fee2e2; color:#b91c1c; border-color:#fecaca; }

    /* ── Log box ─────────────────────────────────────────────────────────── */
    .log-box { font-family:var(--mono); font-size:12px; background:var(--log-bg); color:var(--log-tx); border:1px solid var(--bd); border-radius:var(--r); padding:12px 14px; overflow-y:auto; height:calc(100vh - 230px); box-shadow:var(--shad); }
    .log-entry { display:flex; gap:12px; padding:2px 0; line-height:1.55; }
    .log-entry:hover { background:rgba(128,128,128,.06); border-radius:3px; }
    .l-time  { color:var(--log-time); min-width:90px; flex-shrink:0; }
    .l-level { min-width:48px; font-weight:700; flex-shrink:0; }
    .l-INFO  { color:var(--log-info); }
    .l-WARN  { color:var(--log-warn); }
    .l-ERROR { color:var(--log-err); }
    .l-DEBUG { color:var(--log-dbg); }
    .l-msg   { flex:1; color:var(--log-tx); }
    .l-attr  { display:inline-flex; color:var(--log-mu); background:rgba(0,0,0,.04); border-radius:3px; padding:0 5px; margin-left:4px; font-size:11px; }
    .l-attr-key { opacity:.65; }

    /* Connection dot */
    .conn-dot { width:7px; height:7px; border-radius:50%; background:var(--mu2); flex-shrink:0; transition:background .3s; }
    .conn-dot.live { background:var(--ok); box-shadow:0 0 0 3px rgba(5,150,105,.2); }

    /* ── Skeleton loaders ────────────────────────────────────────────────── */
    .sk-row { display:flex; gap:16px; padding:13px 16px; border-bottom:1px solid var(--bd); align-items:center; }
    .sk-row:last-child { border-bottom:none; }
    .sk { animation:sk-pulse 1.5s ease-in-out infinite; border-radius:4px; background:var(--bd); }
    @keyframes sk-pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

    /* ── Dark mode ───────────────────────────────────────────────────────── */
    [data-theme="dark"] {
      --bg:    #0f0f1e;
      --sur:   #16162a;
      --bd:    #252540;
      --bd2:   #1e1e38;
      --tx:    #e2e6f0;
      --mu:    #8892b0;
      --mu2:   #4e5a72;
      --ac:    #9d5cf8;
      --ach:   #8b4de0;
      --ac-lo: rgba(157,92,248,.12);
      --ac-bg: #1e1036;
      --ok:    #10b981;
      --ok-bg: #042f1a;
      --ok-bd: #065f30;
      --er:    #f87171;
      --er-bg: #2d0a0a;
      --er-bd: #521010;
      --wn:    #fbbf24;
      --car:   #1c1c32;
      --car-h: #222242;
      --hov:   rgba(255,255,255,.025);
      --shad:  0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
      --log-bg:   #0d0d1a;
      --log-tx:   #b8c4d8;
      --log-mu:   #4e5a72;
      --log-time: #364050;
      --log-dbg:  #364050;
      --log-info: #60a5fa;
      --log-warn: #fbbf24;
      --log-err:  #f87171;
    }
    [data-theme="dark"] .badge-live { background:#064e3b; color:#34d399; border-color:#0d6648; }
    [data-theme="dark"] .badge-dry  { background:#2e1065; color:#c4b5fd; border-color:#3e1d8a; }
    [data-theme="dark"] .badge-ok   { background:#064e3b; color:#34d399; border-color:#0d6648; }
    [data-theme="dark"] .badge-err  { background:#450a0a; color:#fca5a5; border-color:#700f0f; }
    [data-theme="dark"] .badge-neu  { background:#1f2937; color:#9ca3af; border-color:#374151; }
    [data-theme="dark"] .bubble-0   { background:#1f2937; color:var(--mu); border-color:#374151; }
    [data-theme="dark"] .bubble-pos { background:#450a0a; color:#f87171; border-color:#700f0f; }
    [data-theme="dark"] .tag-chip   { background:#1e1036; color:#c4b5fd; border-color:rgba(157,92,248,.25); }
    [data-theme="dark"] .lvl-DEBUG  { background:#1f2937; color:#9ca3af; border-color:#374151; }
    [data-theme="dark"] .sk         { background:#252540; }
    [data-theme="dark"] .l-attr     { background:rgba(255,255,255,.05); }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty { text-align:center; padding:56px 16px; color:var(--mu); }
    .empty svg { opacity:.35; margin-bottom:14px; }
    .empty-title { font-size:15px; font-weight:600; color:var(--tx); margin-bottom:6px; }
    .empty-sub   { font-size:13px; line-height:1.6; }

    /* ── Toasts ──────────────────────────────────────────────────────────── */
    #toasts { position:fixed; bottom:24px; right:24px; display:flex; flex-direction:column; gap:8px; z-index:999; }
    .toast { padding:10px 16px; border-radius:var(--r); font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,.2); max-width:340px; animation:fadeUp .18s; }
    .toast-info    { background:#1e40af; color:#fff; }
    .toast-success { background:var(--ok); color:#fff; }
    .toast-error   { background:var(--er); color:#fff; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* ── Misc ────────────────────────────────────────────────────────────── */
    .spin { animation:spin .7s linear infinite; display:inline-block; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .mono { font-family:var(--mono); }
    .muted { color:var(--mu); font-size:12px; }
    .fw { font-weight:600; }
    .text-er { color:var(--er); }
    .text-ok { color:var(--ok); }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <img src="/logo.svg" class="brand-logo" alt="Leash logo">
      <span class="brand-text">Leash</span>
    </div>
    <nav class="nav-section">
      <a class="nav-link" href="#/" id="nl-overview" onclick="navClick(event,'#/')">

<div id="toasts"></div>

<script>
// ── Icons ──────────────────────────────────────────────────────────────────
const moonIcon = '<svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 9.5a6 6 0 1 1-7.5-7.5A7 7 0 1 0 13 9.5z"/></svg>';
const sunIcon  = '<svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="7.5" r="2.5"/><line x1="7.5" y1="1" x2="7.5" y2="3"/><line x1="7.5" y1="12" x2="7.5" y2="14"/><line x1="1" y1="7.5" x2="3" y2="7.5"/><line x1="12" y1="7.5" x2="14" y2="7.5"/><line x1="3.05" y1="3.05" x2="4.46" y2="4.46"/><line x1="10.54" y1="10.54" x2="11.95" y2="11.95"/><line x1="10.54" y1="4.46" x2="11.95" y2="3.05"/><line x1="3.05" y1="11.95" x2="4.46" y2="10.54"/></svg>';
const chevLeft = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="9,2 4,7 9,12"/></svg>';
const chevRight= '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="4,2 8,6 4,10"/></svg>';
const playIcon = '<svg width="11" height="11" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>';
const extIcon  = '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 2H2a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V6.5"/><path d="M7 1h3v3M9 1 5.5 4.5"/></svg>';

// ── Theme ──────────────────────────────────────────────────────────────────
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.innerHTML = t === 'dark' ? sunIcon : moonIcon;
  if (activeEditor) activeEditor.setOption('theme', t === 'dark' ? 'dracula' : 'default');
}
function initTheme() {
  const saved = localStorage.getItem('leash-theme');
  setTheme(saved || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'));
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('leash-theme', next);
  setTheme(next);
}

// ── State ──────────────────────────────────────────────────────────────────
let appUrl = 'https://app.datadoghq.com';
let logES = null, logAll = [], logLevels = new Set(['DEBUG','INFO','WARN','ERROR']);
let logPaused = false, logAutoScroll = true;
let editorDirty = false, kbHandler = null, activeEditor = null;

// ── Router ─────────────────────────────────────────────────────────────────
function navClick(e, hash) {
  e.preventDefault();
  if (editorDirty && !confirm('You have unsaved changes. Leave without saving?')) return;
  editorDirty = false;
  location.hash = hash;
}

function cleanup() {
  if (logES)     { logES.close(); logES = null; }
  if (kbHandler) { document.removeEventListener('keydown', kbHandler); kbHandler = null; }
  activeEditor = null;
}

function setActive(id) {
  ['nl-overview','nl-runs','nl-policies','nl-logs'].forEach(n => {
    document.getElementById(n)?.classList.remove('active');
  });
  document.getElementById(id)?.classList.add('active');
}

function route() {
  const h = location.hash || '#/';
  cleanup();
  const isOverview  = h === '#/' || h === '#/overview';
  const isRuns      = h === '#/runs' || h.startsWith('#/runs/');
  const isPolicies  = h === '#/policies' || h.startsWith('#/policies/');
  const isLogs      = h === '#/logs';
  if (isOverview) setActive('nl-overview');
  else if (isRuns) setActive('nl-runs');
  else if (isPolicies) setActive('nl-policies');
  else if (isLogs) setActive('nl-logs');

  if      (isOverview)               pageOverview();
  else if (h === '#/runs')           pageRunsList();
  else if (h.startsWith('#/runs/'))  pageRunDetail(h.slice(7));
  else if (h === '#/policies')       pagePoliciesList();
  else if (h.startsWith('#/policies/')) pagePolicyEditor(decodeURIComponent(h.slice(11)));
  else if (isLogs)                   pageLogs();
  else                               pageOverview();
}
window.addEventListener('hashchange', route);

// ── API ────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(path, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({ error: r.statusText })); throw new Error(e.error || r.statusText); }
  if (r.status === 204) return null;
  return r.json();
}

// ── Helpers ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const setView = html => { $('view').innerHTML = html; };

function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  $('toasts').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function relative(d) {
  const s = Math.floor((Date.now() - new Date(d)) / 1000);
  if (s < 60)    return 'just now';
  if (s < 3600)  return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function fmtDate(d) {
  return new Date(d).toLocaleString('en-US',
    { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false });
}

function fmtLogTime(d) {
  const dt = new Date(d);
  return dt.toTimeString().slice(0,8) + '.' + String(dt.getMilliseconds()).padStart(3,'0');
}

function fmtSize(b) { return b < 1024 ? b + ' B' : (b/1024).toFixed(1) + ' KB'; }

function resName(props) { return (props && (props.name || props.title || props.email)) || '—'; }

function ddLink(type, id) {
  if (!id) return null;
  switch (type) {
    case 'datadog.monitor':   return appUrl + '/monitors/' + id;
    case 'datadog.slo':       return appUrl + '/slo?slo_id=' + id;
    case 'datadog.synthetic': return appUrl + '/synthetics/details/' + id;
    case 'datadog.dashboard': return appUrl + '/dashboard/' + id;
    case 'datadog.user':      return appUrl + '/organization-settings/users';
    default:                  return null;
  }
}

function dispProp(v) {
  if (v === null || v === undefined) return '';
  if (Array.isArray(v)) return v.join(', ');
  if (typeof v === 'object') return JSON.stringify(v);
  return String(v);
}

function tagsHTML(v) {
  let tags = [];
  if (Array.isArray(v)) tags = v.map(String);
  else if (typeof v === 'string') tags = v.split(',').map(s => s.trim()).filter(Boolean);
  if (!tags.length) return '';
  return '<div class="tag-list">' + tags.map(t => '<span class="tag-chip">' + esc(t) + '</span>').join('') + '</div>';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function skeletonRows(n, cols) {
  const allWidths = ['55%','35%','25%','20%','15%'];
  return Array.from({length:n}, () =>
    '<tr>' +
      allWidths.slice(0, cols).map(w =>
        '<td><div class="sk" style="height:13px;width:' + w + ';border-radius:4px"></div></td>'
      ).join('') +
    '</tr>'
  ).join('');
}

// ── Overview page ──────────────────────────────────────────────────────────
async function pageOverview() {
  setView(
    '<div class="page-header">' +
      '<div><h1 class="page-title">Overview</h1><div class="page-sub" id="ov-sub">Loading…</div></div>' +
      '<div class="btn-row">' +
        '<label class="dry-check"><input type="checkbox" id="ov-dry" checked> Dry run</label>' +
        '<button class="btn btn-primary" id="ov-run-btn">' + playIcon + ' Run Now</button>' +
      '</div>' +
    '</div>' +
    '<div class="stat-grid" id="ov-stats">' +
      ['12','14','16','18'].map(w =>
        '<div class="stat-card"><div class="sk" style="height:32px;width:32px;border-radius:8px;margin-bottom:14px"></div>' +
        '<div class="sk sk-line" style="width:' + w + 'ex;margin-bottom:8px"></div>' +
        '<div class="sk" style="height:26px;width:3ex"></div></div>'
      ).join('') +
    '</div>' +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
      '<span style="font-size:13px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;font-size:11.5px">Recent Runs</span>' +
      '<a href="#/runs" onclick="navClick(event,\'#/runs\')" style="font-size:12.5px;color:var(--ac);font-weight:500">View all →</a>' +
    '</div>' +
    '<div class="card">' +
      '<table class="table"><thead><tr><th>Time</th><th>Mode</th><th>Policies</th><th>Matches</th><th>Run ID</th></tr></thead>' +
      '<tbody id="ov-runs">' + skeletonRows(4, 5) + '</tbody></table>' +
    '</div>'
  );

  $('ov-run-btn').onclick = () => doRun(null, 'ov-run-btn', 'ov-dry');

  try {
    const runs = await api('GET', '/api/runs');
    const sub = $('ov-sub');
    if (sub) {
      if (runs && runs.length > 0) {
        sub.textContent = runs.length + ' run' + (runs.length === 1 ? '' : 's') + ' · last ' + relative(runs[0].generated_at);
      } else {
        sub.textContent = 'No runs yet';
      }
    }

    const lastRun = runs && runs.length > 0 ? runs[0] : null;
    const lastRunMatches = lastRun ? lastRun.total_matches : 0;
    const policyCount = lastRun ? lastRun.policy_count : 0;

    const statsEl = $('ov-stats');
    if (statsEl) statsEl.innerHTML =
      statCard('si-ac',
        '<svg width="16" height="16" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="1.5" y1="3.5" x2="13.5" y2="3.5"/><line x1="1.5" y1="7.5" x2="13.5" y2="7.5"/><line x1="1.5" y1="11.5" x2="13.5" y2="11.5"/></svg>',
        'Total Runs', runs ? runs.length : 0,
        runs && runs.length > 0 ? 'last ' + relative(lastRun.generated_at) : 'No runs yet'
      ) +
      statCard(lastRunMatches > 0 ? 'si-er' : 'si-ok',
        lastRunMatches > 0
          ? '<svg width="16" height="16" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7.5" cy="7.5" r="6"/><line x1="7.5" y1="4.5" x2="7.5" y2="7.5"/><circle cx="7.5" cy="10" r=".5" fill="currentColor" stroke="none"/></svg>'
          : '<svg width="16" height="16" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2,8 5.5,11.5 13,4"/></svg>',
        'Violations', lastRunMatches,
        lastRunMatches > 0 ? 'in last run' : 'all clean'
      ) +
      statCard('si-neu',
        '<svg width="16" height="16" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 1h6l4 4v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1z"/><polyline points="9,1 9,5 13,5"/></svg>',
        'Policies', policyCount,
        policyCount > 0 ? 'in last run' : 'none loaded'
      ) +
      statCard('si-neu',
        '<svg width="16" height="16" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="7.5" r="6"/><polyline points="7.5,4 7.5,7.5 10,9"/></svg>',
        'Schedule', appSchedule || '—',
        appSchedule ? 'cron expression' : 'manual only',
        true
      );

    const tbody = $('ov-runs');
    if (!tbody) return;
    if (!runs || runs.length === 0) {
      tbody.innerHTML =
        '<tr><td colspan="5"><div class="empty">' +
          '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
          '<div class="empty-title">No runs yet</div>' +
          '<div class="empty-sub">Click "Run Now" to evaluate your policies against Datadog.</div>' +
        '</div></td></tr>';
      return;
    }

    // update badge — last run only
    if (lastRun && lastRun.total_matches > 0) {
      const nb = $('nav-badge-runs');
      if (nb) { nb.textContent = lastRun.total_matches; nb.style.display = ''; }
    }

    tbody.innerHTML = runs.slice(0, 5).map(r => runRow(r)).join('');
  } catch(e) {
    const sub = $('ov-sub');
    if (sub) sub.textContent = 'Failed to load';
    const tbody = $('ov-runs');
    if (tbody) tbody.innerHTML = '<tr><td colspan="5" class="muted" style="padding:16px">Error: ' + esc(e.message) + '</td></tr>';
  }
}

function statCard(iconCls, iconSvg, label, value, sub, small) {
  const valStr = small ? '<span style="font-size:13px;font-weight:700;letter-spacing:0;line-height:1.3">' + esc(String(value)) + '</span>' :
    '<div class="stat-value">' + esc(String(value)) + '</div>';
  return '<div class="stat-card">' +
    '<div class="stat-icon ' + iconCls + '">' + iconSvg + '</div>' +
    '<div class="stat-label">' + esc(label) + '</div>' +
    (small ? valStr : valStr) +
    '<div class="stat-sub">' + esc(sub) + '</div>' +
  '</div>';
}

function runRow(r) {
  const mc = r.total_matches > 0;
  return '<tr class="clickable" onclick="location.hash=\'#/runs/' + r.run_id + '\'">' +
    '<td><div class="fw">' + fmtDate(r.generated_at) + '</div><div class="muted">' + relative(r.generated_at) + '</div></td>' +
    '<td><span class="badge ' + (r.dry_run ? 'badge-dry' : 'badge-live') + '">' + (r.dry_run ? 'Dry Run' : 'Live') + '</span></td>' +
    '<td>' + r.policy_count + '</td>' +
    '<td style="font-weight:' + (mc ? 700 : 400) + '" class="' + (mc ? 'text-er' : '') + '">' + r.total_matches + '</td>' +
    '<td class="mono muted">' + r.run_id.slice(0,8) + '</td>' +
  '</tr>';
}

// ── Runs list ──────────────────────────────────────────────────────────────
async function pageRunsList() {
  setView(
    '<div class="page-header">' +
      '<div><h1 class="page-title">Runs</h1></div>' +
      '<div class="btn-row">' +
        '<label class="dry-check"><input type="checkbox" id="dry-chk" checked> Dry run</label>' +
        '<button class="btn btn-primary" id="run-btn">' + playIcon + ' Run Now</button>' +
      '</div>' +
    '</div>' +
    '<div class="card">' +
      '<table class="table"><thead><tr><th>Time</th><th>Mode</th><th>Policies</th><th>Matches</th><th>Run ID</th></tr></thead>' +
      '<tbody id="runs-body">' + skeletonRows(6, 5) + '</tbody></table>' +
    '</div>'
  );

  $('run-btn').onclick = () => doRun(null, 'run-btn', 'dry-chk');

  try {
    const runs = await api('GET', '/api/runs');
    const body = $('runs-body');
    if (!body) return;
    if (!runs || runs.length === 0) {
      body.innerHTML =
        '<tr><td colspan="5"><div class="empty">' +
          '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>' +
          '<div class="empty-title">No runs yet</div>' +
          '<div class="empty-sub">Click "Run Now" to evaluate your policies against Datadog.</div>' +
        '</div></td></tr>';
      return;
    }
    body.innerHTML = runs.map(r => runRow(r)).join('');
  } catch(e) {
    const body = $('runs-body');
    if (body) body.innerHTML =
      '<tr><td colspan="5"><div class="empty"><div class="empty-title">Failed to load runs</div><div class="empty-sub">' + esc(e.message) + '</div></div></td></tr>';
  }
}

async function doRun(policyPath, btnId, dryChkId) {
  const dry = $(dryChkId) ? $(dryChkId).checked : true;
  const btn = $(btnId);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin">&#9675;</span> Running…'; }
  try {
    const body = { dry_run: dry };
    if (policyPath) body.policy_path = policyPath;
    const report = await api('POST', '/api/runs', body);
    const total = report.policies.reduce((s, p) => s + p.match_count, 0);
    toast('Run complete — ' + total + ' match' + (total === 1 ? '' : 'es') + ' found', total > 0 ? 'info' : 'success');
    location.hash = '#/runs/' + report.run_id;
  } catch(e) {
    toast('Run failed: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = playIcon + ' Run Now'; }
  }
}

// ── Run detail ─────────────────────────────────────────────────────────────
async function pageRunDetail(id) {
  setView(
    '<a class="back-link" href="#/runs" onclick="navClick(event,\'#/runs\')">' + chevLeft + ' Runs</a>' +
    '<div id="run-detail"><div class="empty"><span class="spin">&#9675;</span></div></div>'
  );

  try {
    const r = await api('GET', '/api/runs/' + id);
    const totalMatches = r.policies.reduce((s, p) => s + p.match_count, 0);
    const totalPassing = r.policies.reduce((s, p) => s + (p.pass_count || 0), 0);
    const matchPols = r.policies.filter(p => p.match_count > 0);
    const cleanPols = r.policies.filter(p => p.match_count === 0);

    function propRows(props) {
      const priority = ['name','title','email','type','status','sli_type','slo_type'];
      const entries = Object.entries(props || {}).filter(([k]) => k !== 'raw');
      const sorted = entries.filter(([k]) => priority.includes(k))
        .concat(entries.filter(([k]) => !priority.includes(k)))
        .slice(0, 14);

      return sorted.map(([k, v]) => {
        if (k === 'tags' && (Array.isArray(v) || typeof v === 'string')) {
          return '<tr><td>' + esc(k) + '</td><td>' + tagsHTML(v) + '</td></tr>';
        }
        const d = dispProp(v);
        return '<tr><td>' + esc(k) + '</td><td>' + esc(d.length > 140 ? d.slice(0,140) + '…' : d) + '</td></tr>';
      }).join('');
    }

    function matchCardHTML(m, resourceType, pol, isViolation) {
      const name = resName(m.properties);
      const link = ddLink(resourceType, m.id);
      const rows = propRows(m.properties);
      const acts = isViolation
        ? (pol.actions_taken || []).filter(a => a.resource_id === m.id)
        : [];
      const actBadges = acts.map(a =>
        '<span class="badge ' + (a.error ? 'badge-err' : 'badge-ok') + '">' +
          esc(a.action_type) + (a.dry_run ? ' (dry)' : '') + '</span>'
      ).join('');

      return '<div class="match-card ' + (isViolation ? 'violation' : 'passing') + '">' +
        '<div class="match-header">' +
          '<div style="flex:1;min-width:0">' +
            '<div class="match-name">' + esc(name) + '</div>' +
            '<div class="match-id">' + esc(m.id) + '</div>' +
          '</div>' +
          (link ? '<a class="dd-link" href="' + link + '" target="_blank" rel="noopener">View in Datadog ' + extIcon + '</a>' : '') +
        '</div>' +
        (rows || actBadges ?
          '<div class="match-body">' +
            (rows ? '<table class="props-table"><tbody>' + rows + '</tbody></table>' : '') +
            (actBadges ? '<div class="action-badges">' + actBadges + '</div>' : '') +
          '</div>' : '') +
      '</div>';
    }

    function polSectionHTML(pol, isViolation) {
      const bubble = pol.match_count > 0 ? 'bubble-pos' : 'bubble-0';
      const uid = 'pol-' + pol.policy_name.replace(/\W+/g,'-');
      const matchCards = (pol.matches || []).map(m => matchCardHTML(m, pol.resource, pol, true)).join('');
      const passCt = pol.pass_count || 0;
      const passCards = (pol.passing || []).map(m => matchCardHTML(m, pol.resource, pol, false)).join('');
      const passSection = passCt > 0
        ? '<div class="pass-toggle-wrap">' +
            '<button class="btn btn-ghost btn-xs" onclick="(function(b,el){el.style.display=el.style.display===\'none\'?\'block\':\'none\';b.textContent=(el.style.display===\'none\'?\'Show \':\'Hide \')+\'' + passCt + ' passing\'})(this,document.getElementById(\'' + uid + '-pass\'))">' +
              'Show ' + passCt + ' passing' +
            '</button>' +
          '</div>' +
          '<div id="' + uid + '-pass" style="display:none">' + passCards + '</div>'
        : '';

      // auto-open if violations; closed if clean
      const open = isViolation;
      return '<div class="pol-row" id="' + uid + '">' +
        '<div class="pol-row-hdr" onclick="togglePolRow(\'' + uid + '\')">' +
          '<span class="pol-chevron' + (open ? ' open' : '') + '">' + chevRight + '</span>' +
          '<span class="pol-row-name">' + esc(pol.policy_name) + '</span>' +
          '<span class="pol-row-type">' + esc(pol.resource.replace('datadog.','')) + '</span>' +
          '<span class="match-bubble ' + bubble + '">' + pol.match_count + '</span>' +
        '</div>' +
        '<div class="pol-row-body' + (open ? ' open' : '') + '">' +
          (matchCards || passSection
            ? matchCards + passSection
            : '<div style="padding:12px 16px;font-size:13px;color:var(--mu)">No violations</div>') +
        '</div>' +
      '</div>';
    }

    $('run-detail').innerHTML =
      '<div class="page-header">' +
        '<div><h1 class="page-title">Run <span class="mono" style="font-size:15px;font-weight:400">' + esc(id.slice(0,8)) + '</span></h1></div>' +
      '</div>' +
      '<div class="run-meta">' +
        '<div class="meta-item"><div class="meta-label">Mode</div><div class="meta-value"><span class="badge ' + (r.dry_run ? 'badge-dry' : 'badge-live') + '">' + (r.dry_run ? 'Dry Run' : 'Live') + '</span></div></div>' +
        '<div class="meta-item"><div class="meta-label">Time</div><div class="meta-value">' + fmtDate(r.generated_at) + '</div></div>' +
        '<div class="meta-item"><div class="meta-label">Policies</div><div class="meta-value">' + r.policies.length + '</div></div>' +
        '<div class="meta-item"><div class="meta-label">Violations</div><div class="meta-value ' + (totalMatches > 0 ? 'text-er' : '') + '">' + totalMatches + '</div></div>' +
        '<div class="meta-item"><div class="meta-label">Passing</div><div class="meta-value text-ok">' + totalPassing + '</div></div>' +
      '</div>' +

      (matchPols.length > 0 ?
        '<div class="section-hdr"><span class="sh-dot sh-dot-er"></span><span class="sh-title">' + totalMatches + ' violation' + (totalMatches===1?'':'s') + ' found</span><span class="sh-count">' + matchPols.length + ' polic' + (matchPols.length===1?'y':'ies') + '</span></div>' +
        '<div class="card" style="margin-bottom:20px">' + matchPols.map(p => polSectionHTML(p, true)).join('') + '</div>' : '') +

      (cleanPols.length > 0 ?
        '<div class="section-hdr' + (matchPols.length > 0 ? ' mt24' : '') + '"><span class="sh-dot sh-dot-ok"></span><span class="sh-title">' + cleanPols.length + ' clean polic' + (cleanPols.length===1?'y':'ies') + '</span></div>' +
        '<div class="card">' + cleanPols.map(p => polSectionHTML(p, false)).join('') + '</div>' : '') +

      (r.policies.length === 0 ?
        '<div class="card"><div class="empty"><div class="empty-title">No policies ran</div></div></div>' : '');

  } catch(e) {
    $('run-detail').innerHTML =
      '<div class="empty"><div class="empty-title">Failed to load run</div><div class="empty-sub">' + esc(e.message) + '</div></div>';
  }
}

function togglePolRow(uid) {
  const row = $(uid);
  if (!row) return;
  const chev = row.querySelector('.pol-chevron');
  const body = row.querySelector('.pol-row-body');
  const open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  chev && chev.classList.toggle('open', !open);
}

// ── Policies list ──────────────────────────────────────────────────────────
async function pagePoliciesList() {
  setView(
    '<div class="page-header"><h1 class="page-title">Policies</h1></div>' +
    '<div class="card">' +
      '<table class="table"><thead><tr><th>File</th><th>Directory</th><th style="text-align:right">Size</th></tr></thead>' +
      '<tbody id="pol-body">' + skeletonRows(4, 3) + '</tbody></table>' +
    '</div>'
  );

  try {
    const pols = await api('GET', '/api/policies');
    const body = $('pol-body');
    if (!body) return;
    if (!pols || pols.length === 0) {
      body.innerHTML =
        '<tr><td colspan="3"><div class="empty">' +
          '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
          '<div class="empty-title">No policies found</div>' +
          '<div class="empty-sub">Add YAML files to your policy directories.</div>' +
        '</div></td></tr>';
      return;
    }
    body.innerHTML = pols.map(p => {
      const parts = p.path.split('/');
      const file  = parts.pop();
      const dir   = parts.join('/') || '.';
      return '<tr class="clickable" onclick="location.hash=\'#/policies/' + encodeURIComponent(p.path) + '\'">' +
        '<td><span class="fw">' + esc(file) + '</span></td>' +
        '<td class="muted mono">' + esc(dir) + '</td>' +
        '<td class="muted" style="text-align:right">' + fmtSize(p.size) + '</td>' +
      '</tr>';
    }).join('');
  } catch(e) {
    const body = $('pol-body');
    if (body) body.innerHTML =
      '<tr><td colspan="3"><div class="empty"><div class="empty-title">Error</div><div class="empty-sub">' + esc(e.message) + '</div></div></td></tr>';
  }
}

// ── Policy editor ──────────────────────────────────────────────────────────
async function pagePolicyEditor(path) {
  editorDirty = false;
  const parts    = path.split('/');
  const filename = parts[parts.length - 1];

  setView(
    '<a class="back-link" href="#/policies" onclick="navClick(event,\'#/policies\')">' + chevLeft + ' Policies</a>' +
    '<div class="editor-header">' +
      '<div class="editor-filename">' + esc(filename) + '</div>' +
      '<div class="btn-row">' +
        '<span class="save-status" id="save-status"></span>' +
        '<span class="muted" style="font-size:11px">⌘S to save</span>' +
        '<label class="dry-check"><input type="checkbox" id="ed-dry" checked> Dry run</label>' +
        '<button class="btn btn-ghost btn-sm" id="run-pol-btn">' + playIcon + ' Run</button>' +
        '<button class="btn btn-primary btn-sm" id="save-btn">Save</button>' +
      '</div>' +
    '</div>' +
    '<div class="cm-wrap" id="editor-ta"></div>'
  );

  const cmTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dracula' : 'default';
  const cm = CodeMirror($('editor-ta'), {
    mode: 'yaml', theme: cmTheme, lineNumbers: true, tabSize: 2,
    indentWithTabs: false, lineWrapping: false,
    extraKeys: { Tab: c => c.replaceSelection('  ', 'end') },
  });
  let original = '';

  try {
    const data = await api('GET', '/api/policies?path=' + encodeURIComponent(path));
    cm.setValue(data.content);
    original = data.content;
    cm.clearHistory();
  } catch(e) {
    toast('Failed to load policy: ' + e.message, 'error');
  }

  cm.on('change', () => {
    editorDirty = cm.getValue() !== original;
    const ss = $('save-status');
    if (ss) { ss.textContent = editorDirty ? 'Unsaved changes' : ''; ss.className = 'save-status' + (editorDirty ? ' dirty' : ''); }
  });
  cm.on('focus', () => $('editor-ta')?.classList.add('focused'));
  cm.on('blur',  () => $('editor-ta')?.classList.remove('focused'));
  activeEditor = cm;

  async function save() {
    const btn = $('save-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    try {
      await api('PUT', '/api/policies?path=' + encodeURIComponent(path), { content: cm.getValue() });
      original = cm.getValue(); editorDirty = false;
      const ss = $('save-status');
      if (ss) { ss.textContent = 'Saved'; ss.className = 'save-status saved'; }
      setTimeout(() => { const s2 = $('save-status'); if (s2 && s2.textContent === 'Saved') s2.textContent = ''; }, 2500);
      toast('Policy saved', 'success');
    } catch(e) {
      toast('Save failed: ' + e.message, 'error');
    } finally {
      const btn2 = $('save-btn');
      if (btn2) { btn2.disabled = false; btn2.textContent = 'Save'; }
    }
  }

  $('save-btn').onclick = save;
  $('run-pol-btn').onclick = async () => {
    if (editorDirty) await save();
    const btn = $('run-pol-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin">&#9675;</span> Running…'; }
    const dry = $('ed-dry') ? $('ed-dry').checked : true;
    try {
      const report = await api('POST', '/api/runs', { dry_run: dry, policy_path: path });
      const total = report.policies.reduce((s, p) => s + p.match_count, 0);
      toast('Run complete — ' + total + ' match' + (total===1?'':'es') + ' found', total > 0 ? 'info' : 'success');
      location.hash = '#/runs/' + report.run_id;
    } catch(e) {
      toast('Run failed: ' + e.message, 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = playIcon + ' Run'; }
    }
  };

  kbHandler = e => { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); } };
  document.addEventListener('keydown', kbHandler);
}

// ── Logs ───────────────────────────────────────────────────────────────────
function pageLogs() {
  logPaused = false; logAutoScroll = true; logAll = [];

  setView(
    '<div class="page-header" style="margin-bottom:10px">' +
      '<h1 class="page-title">Logs</h1>' +
      '<div class="btn-row">' +
        '<span class="level-sel-label">Server level:</span>' +
        '<select id="srv-level" class="level-sel">' +
          ['DEBUG','INFO','WARN','ERROR'].map(l => '<option value="' + l + '">' + l + '</option>').join('') +
        '</select>' +
        '<button class="btn btn-ghost btn-sm" id="pause-btn">Pause</button>' +
        '<button class="btn btn-ghost btn-sm" id="clear-btn">Clear</button>' +
      '</div>' +
    '</div>' +
    '<div class="log-toolbar">' +
      '<div class="btn-row" style="margin-right:4px">' +
        '<span class="conn-dot" id="conn-dot"></span>' +
        '<span class="level-sel-label" id="conn-label">Connecting…</span>' +
      '</div>' +
      '<span class="level-sel-label" style="margin-left:8px;margin-right:4px">Show:</span>' +
      ['DEBUG','INFO','WARN','ERROR'].map(l =>
        '<button class="lvl-btn lvl-' + l + '" data-level="' + l + '">' + l + '</button>'
      ).join('') +
    '</div>' +
    '<div class="log-box" id="log-box"></div>'
  );

  api('GET', '/api/log-level').then(d => {
    const sel = $('srv-level');
    if (sel && d && d.level) sel.value = d.level;
  }).catch(() => {});

  $('srv-level').onchange = function() {
    api('PUT', '/api/log-level', { level: this.value })
      .catch(e => toast('Failed to set log level: ' + e.message, 'error'));
  };

  const box = $('log-box');

  function appendEntry(e) {
    if (!logLevels.has(e.level)) return;
    const row = document.createElement('div');
    row.className = 'log-entry';
    row.dataset.level = e.level;
    const attrs = (e.attrs || []).map(a =>
      '<span class="l-attr"><span class="l-attr-key">' + esc(a.k) + '=</span>' + esc(a.v) + '</span>'
    ).join('');
    row.innerHTML =
      '<span class="l-time">'                         + fmtLogTime(e.time) + '</span>' +
      '<span class="l-level l-' + e.level + '">' + e.level    + '</span>' +
      '<span class="l-msg">'                          + esc(e.msg) + '</span>' +
      (attrs ? '<span>' + attrs + '</span>' : '');
    box.appendChild(row);
    if (logAutoScroll) box.scrollTop = box.scrollHeight;
  }

  document.querySelectorAll('.lvl-btn').forEach(btn => {
    const lv = btn.dataset.level;
    if (!logLevels.has(lv)) btn.classList.add('off');
    btn.onclick = () => {
      if (logLevels.has(lv)) { logLevels.delete(lv); btn.classList.add('off'); }
      else                   { logLevels.add(lv);    btn.classList.remove('off'); }
      box.innerHTML = '';
      logAll.forEach(e => appendEntry(e));
    };
  });

  $('pause-btn').onclick = () => {
    logPaused = !logPaused; logAutoScroll = !logPaused;
    $('pause-btn').textContent = logPaused ? 'Resume' : 'Pause';
    if (!logPaused) { box.innerHTML = ''; logAll.forEach(e => appendEntry(e)); box.scrollTop = box.scrollHeight; }
  };

  $('clear-btn').onclick = () => { logAll = []; box.innerHTML = ''; };

  box.addEventListener('scroll', () => {
    logAutoScroll = box.scrollTop + box.clientHeight >= box.scrollHeight - 24;
  });

  logES = new EventSource('/api/logs/stream');
  logES.onopen = () => {
    const dot = $('conn-dot'); const lbl = $('conn-label');
    if (dot) dot.classList.add('live');
    if (lbl) lbl.textContent = 'Live';
  };
  logES.onerror = () => {
    const dot = $('conn-dot'); const lbl = $('conn-label');
    if (dot) dot.classList.remove('live');
    if (lbl) lbl.textContent = 'Disconnected';
  };
  logES.onmessage = ev => {
    const e = JSON.parse(ev.data);
    logAll.push(e);
    if (!logPaused) appendEntry(e);
  };
}

initTheme();
fetch('/api/config').then(r => r.json()).then(c => {
  appUrl = c.app_url || appUrl;

    const el = $('sidebar-schedule');
    const txt = $('sidebar-schedule-text');
    if (el) el.style.display = 'flex';
    if (txt) txt.textContent = appSchedule;
  }
}).catch(() => {});
route();
