name: Test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./... -v -race -count=1

  validate-policies:
    name: Validate policies
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v7

      - name: Build leash image
        run: docker build -t leash:ci .

      - name: Validate all policies
        run: docker run --rm -v ${{ github.workspace }}/policies:/policies:ro leash:ci validate --policy /policies/
